<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>イジンデン カードビューア</title>
	<meta name="format-detection" content="telephone=no">

	<!-- OGP -->

	<!-- Favicon / PWA -->

	<!-- Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Oxanium:wght@300&display=swap" rel="stylesheet">

	<!-- CSS -->
	<link rel="stylesheet" href="./assets/css/reset.css">
	<link rel="stylesheet" href="./assets/css/style.css">

	<!-- JS -->
	<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
</head>

<body>
	<header class="header">
		<h1 class="header__logo">
			<img src="./assets/images/logo.png" alt="イジンデン" width="1594" height="937" loading="lazy" decoding="async">
		</h1>
		<button class="header__action" id="openSearchModalButton" type="button">検索</button>
	</header>

	<main class="viewer">
		<div class="l-container">
			<aside class="viewer__controls is-collapsed">
				<div class="viewer__controls-body" id="viewerControlsBody">
					<div class="viewer__controls-panels" id="viewerControlsPanels">
						<section class="info-panel">
							<div class="info-panel__status">
								<div class="info-panel__counts">
									<p class="info-panel__txt">総件数: <strong id="totalCount">0</strong></p>
									<p class="info-panel__txt">表示件数: <strong id="resultCount">0</strong></p>
								</div>
								<button type="button" class="viewer__controls-reset" id="resetFiltersButton">条件リセット</button>
							</div>
							<label class="filter-form__field">
								<span class="filter-form__label">カード名 / テキスト検索</span>
								<input id="searchInput" type="text" placeholder="例: 信長 / ドロー / 除去" />
							</label>

							<label class="filter-form__field">
								<span class="filter-form__label">弾</span>
								<div class="filter-form__wrap">
									<select id="seriesFilter">
										<option value="">すべて</option>
									</select>
								</div>
							</label>

							<label class="filter-form__field">
								<span class="filter-form__label">種別</span>
								<div class="filter-form__wrap">
									<select id="typeFilter">
										<option value="">すべて</option>
									</select>
								</div>
							</label>

							<label class="filter-form__field">
								<span class="filter-form__label">属性</span>
								<div class="filter-form__wrap">
									<select id="attributeFilter">
										<option value="">すべて</option>
									</select>
								</div>
							</label>

							<div class="filter-form__field filter-form__field--range">
								<span class="filter-form__label">コスト</span>
								<div class="filter-form__range-fields">
									<input id="costMin" type="number" min="0" placeholder="最小" />
									<input id="costMax" type="number" min="0" placeholder="最大" />
								</div>
							</div>

							<div class="filter-form__field filter-form__field--range">
								<span class="filter-form__label">BP</span>
								<div class="filter-form__range-fields">
									<input id="bpMin" type="number" min="0" placeholder="最小" />
									<input id="bpMax" type="number" min="0" placeholder="最大" />
								</div>
							</div>

							<label class="filter-form__field">
								<span class="filter-form__label">並び順</span>
								<div class="filter-form__wrap">
									<select id="sortSelect">
										<option value="series-number">弾 番号</option>
										<option value="name-asc">名前 あ→ん</option>
										<option value="name-desc">名前 ん→あ</option>
										<option value="cost-asc">コスト 低→高</option>
										<option value="cost-desc">コスト 高→低</option>
										<option value="bp-asc">BP 低→高</option>
										<option value="bp-desc">BP 高→低</option>
									</select>
								</div>
							</label>
							<label class="filter-form__field filter-form__field--check">
								<span class="filter-form__label">チェック済みのみ表示</span>
								<input id="checkedOnlyFilter" type="checkbox">
							</label>

							<div class="filter-form__field">
								<span class="filter-form__label">表示形式</span>
								<div class="view-switch" role="group" aria-label="表示形式の切り替え">
									<button type="button" id="viewDetailButton" class="view-switch__btn">詳細リスト</button>
									<button type="button" id="viewImageButton" class="view-switch__btn">画像グリッド</button>
								</div>
							</div>
							<button type="button" class="viewer__controls-toggle" id="controlsToggleButton" aria-expanded="false" aria-controls="viewerControlsPanels">
								検索を閉じる
							</button>
						</section>
					</div>
				</div>
			</aside>
			<section class="viewer__main">
				<div class="cards" id="cardsGrid"></div>
				<div class="empty-state is-hidden" id="emptyState">
					条件に一致するカードがありません。
				</div>
				<nav class="pagination" id="pagination" aria-label="ページネーション"></nav>
				<p class="pagination__total" id="paginationTotal"></p>
			</section>
		</div>
	</main>


	<dialog class="card-modal" id="cardModal">
		<button type="button" class="card-modal__close" id="cardModalCloseButton" aria-label="閉じる">×</button>
		<article class="card-modal__content" id="modalContent"></article>
	</dialog>

	<dialog class="search-modal" id="searchModal">
		<div class="search-modal__content info-panel">
			<label class="filter-form__field">
				<span class="filter-form__label">カード名 / テキスト検索</span>
				<input id="searchModalInput" type="text" placeholder="例: 信長 / ドロー / 除去">
			</label>
			<label class="filter-form__field">
				<span class="filter-form__label">弾</span>
				<div class="filter-form__wrap">
					<select id="seriesFilterModal">
						<option value="">すべて</option>
					</select>
				</div>
			</label>
			<label class="filter-form__field">
				<span class="filter-form__label">種別</span>
				<div class="filter-form__wrap">
					<select id="typeFilterModal">
						<option value="">すべて</option>
					</select>
				</div>
			</label>
			<label class="filter-form__field">
				<span class="filter-form__label">属性</span>
				<div class="filter-form__wrap">
					<select id="attributeFilterModal">
						<option value="">すべて</option>
					</select>
				</div>
			</label>
			<div class="filter-form__field filter-form__field--range">
				<span class="filter-form__label">コスト</span>
				<div class="filter-form__range-fields">
					<input id="costMinModal" type="number" min="0" placeholder="最小">
					<input id="costMaxModal" type="number" min="0" placeholder="最大">
				</div>
			</div>
			<div class="filter-form__field filter-form__field--range">
				<span class="filter-form__label">BP</span>
				<div class="filter-form__range-fields">
					<input id="bpMinModal" type="number" min="0" placeholder="最小">
					<input id="bpMaxModal" type="number" min="0" placeholder="最大">
				</div>
			</div>
			<label class="filter-form__field">
				<span class="filter-form__label">並び順</span>
				<div class="filter-form__wrap">
					<select id="sortSelectModal">
						<option value="series-number">弾 番号</option>
						<option value="name-asc">名前 あ→ん</option>
						<option value="name-desc">名前 ん→あ</option>
						<option value="cost-asc">コスト 低→高</option>
						<option value="cost-desc">コスト 高→低</option>
						<option value="bp-asc">BP 低→高</option>
						<option value="bp-desc">BP 高→低</option>
					</select>
				</div>
			</label>
			<label class="filter-form__field filter-form__field--check">
				<span class="filter-form__label">チェック済みのみ表示</span>
				<input id="checkedOnlyFilterModal" type="checkbox">
			</label>
			<div class="search-modal__actions">
				<button type="button" class="search-modal__button search-modal__button--submit" id="searchModalSubmitButton">検索</button>
				<button type="button" class="search-modal__button" id="searchModalCloseButton">閉じる</button>
			</div>
		</div>
	</dialog>

	<script type="module" src="./assets/js/app.js"></script>
</body>

</html>
